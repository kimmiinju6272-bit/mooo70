<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>서울 벚꽃 명소 상세</title>
  <style>
    :root {
      --bg: #fff7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #f3d0e4;
      --accent: #d9468f;
      --accent-soft: #fce7f3;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #ffeef7 0%, #fff8fc 45%, #ffffff 100%);
      line-height: 1.6;
    }

    .hero {
      color: #fff;
      min-height: 260px;
      display: flex;
      align-items: flex-end;
      padding: 36px 20px;
      background: linear-gradient(rgba(30, 27, 75, 0.5), rgba(30, 27, 75, 0.5)),
        url("https://images.unsplash.com/photo-1522383225653-ed111181a951?auto=format&fit=crop&w=1600&q=80")
        center/cover no-repeat;
    }

    .hero-inner {
      max-width: 980px;
      width: 100%;
      margin: 0 auto;
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      background: rgba(255, 255, 255, 0.16);
      font-size: 13px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0 0 4px;
      font-size: clamp(28px, 4vw, 40px);
    }

    .subtitle {
      margin: 0;
      color: #f3f4f6;
    }

    .container {
      max-width: 980px;
      margin: 22px auto 44px;
      padding: 0 16px;
      display: grid;
      gap: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 8px 18px rgba(217, 70, 143, 0.08);
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 20px;
      color: var(--accent);
    }

    .meta-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    .meta-item {
      border: 1px solid #f8d9ea;
      border-radius: 10px;
      padding: 12px;
      background: #fffafd;
    }

    .k {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 2px;
    }

    .v {
      font-weight: 700;
    }

    .highlight {
      background: var(--accent-soft);
      border-left: 4px solid var(--accent);
      border-radius: 8px;
      padding: 12px 14px;
      margin-top: 10px;
    }

    ul {
      margin: 8px 0 0;
      padding-left: 18px;
    }

    .review-list {
      list-style: none;
      margin: 10px 0 0;
      padding: 0;
      display: grid;
      gap: 10px;
    }

    .review-item {
      border: 1px solid #f8d9ea;
      border-radius: 10px;
      padding: 12px;
      background: #fffafd;
    }

    .review-meta {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .review-text {
      margin: 0;
    }

    .actions {
      display: flex;
      justify-content: center;
      margin-top: 6px;
    }

    .btn {
      text-decoration: none;
      color: #fff;
      background: var(--accent);
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 600;
    }

    .footer {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 0 16px 24px;
    }

    .petal-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 9999;
    }

    .petal {
      position: absolute;
      top: -30px;
      width: 14px;
      height: 10px;
      background: radial-gradient(circle at 30% 30%, #ffe8f1 0%, #ffc4de 70%);
      border-radius: 80% 20% 70% 30%;
      opacity: 0.85;
      animation: petal-fall linear forwards;
    }

    @keyframes petal-fall {
      0% {
        transform: translate3d(0, -20px, 0) rotate(0deg);
      }
      100% {
        transform: translate3d(var(--drift-x, 80px), 110vh, 0) rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <span class="badge">서울 벚꽃 명소</span>
      <h1 id="spot-title">상세페이지</h1>
      <p class="subtitle" id="spot-subtitle">명소 상세 정보</p>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h2>기본 정보</h2>
      <div class="meta-grid">
        <div class="meta-item">
          <span class="k">장소명</span>
          <span class="v" id="spot-name">-</span>
        </div>
        <div class="meta-item">
          <span class="k">주소</span>
          <span class="v" id="spot-address">-</span>
        </div>
        <div class="meta-item">
          <span class="k">추천 시간</span>
          <span class="v" id="spot-time">-</span>
        </div>
        <div class="meta-item">
          <span class="k">주요 포인트</span>
          <span class="v" id="spot-point">-</span>
        </div>
        <div class="meta-item">
          <span class="k">이화여대(현위치) 기준 도로 거리</span>
          <span class="v" id="spot-distance">계산 중...</span>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>소개</h2>
      <p id="spot-description">-</p>
      <div class="highlight" id="spot-highlight">-</div>
    </section>

    <section class="card">
      <h2>추천 동선</h2>
      <ul id="spot-route"></ul>
    </section>

    <section class="card">
      <h2>방문 팁</h2>
      <ul id="spot-tips"></ul>
    </section>

    <section class="card">
      <h2>방문자 리뷰</h2>
      <ul id="spot-reviews" class="review-list"></ul>
    </section>

    <div class="actions">
      <a class="btn" href="./index.html">명소 목록으로 돌아가기</a>
    </div>
  </main>

  <p class="footer">서울 벚꽃 명소 상세페이지</p>

  <script>
    function startPetalAnimation() {
      const layer = document.createElement("div");
      layer.className = "petal-layer";
      document.body.appendChild(layer);

      function spawnPetal() {
        const petal = document.createElement("span");
        petal.className = "petal";
        petal.style.left = `${Math.random() * 100}vw`;
        petal.style.opacity = (0.55 + Math.random() * 0.35).toFixed(2);
        petal.style.width = `${10 + Math.random() * 10}px`;
        petal.style.height = `${8 + Math.random() * 8}px`;
        petal.style.setProperty("--drift-x", `${-120 + Math.random() * 240}px`);
        petal.style.animationDuration = `${7 + Math.random() * 8}s`;
        layer.appendChild(petal);
        petal.addEventListener("animationend", () => {
          petal.remove();
        });
      }

      setInterval(spawnPetal, 320);
      for (let i = 0; i < 16; i += 1) {
        setTimeout(spawnPetal, i * 140);
      }
    }

    startPetalAnimation();

    const currentLocation = {
      name: "이화여자대학교",
      lat: 37.5619,
      lng: 126.9468
    };

    const details = {
      "경복궁": {
        subtitle: "고궁과 벚꽃이 어우러진 전통미",
        address: "서울 종로구 사직로 161",
        time: "오전 9시~11시",
        point: "근정전, 경회루 주변",
        lat: 37.5796,
        lng: 126.977,
        description: "고궁의 단아한 건축미 위로 벚꽃이 내려앉는 서울 대표 봄 명소입니다.",
        highlight: "한복 착용 후 방문하면 사진 분위기가 더 살아납니다.",
        route: ["광화문 입장", "흥례문-근정전 관람", "경회루 주변 산책"],
        tips: ["주말 혼잡이 심해 평일 오전 방문 추천", "입장 마감 시간 사전 확인 필수"],
        reviews: [
          { name: "익명", rating: 5, text: "고궁과 벚꽃 조합이 정말 예뻐서 사진이 잘 나와요." },
          { name: "익명", rating: 4, text: "아침 일찍 가니 한적해서 산책하기 좋았습니다." },
          { name: "익명", rating: 5, text: "경회루 근처 풍경이 특히 인상적이었어요." }
        ]
      },
      "어린이대공원": {
        subtitle: "가족 나들이에 좋은 넓은 벚꽃 산책로",
        address: "서울 광진구 능동로 216",
        time: "오전 10시 전",
        point: "호수 산책로, 중앙 잔디광장",
        lat: 37.5485,
        lng: 127.0818,
        description: "넓은 동선과 편한 접근성으로 가족 단위 방문객이 많은 벚꽃 명소입니다.",
        highlight: "동물원, 놀이시설과 함께 하루 코스로 즐기기 좋습니다.",
        route: ["정문 입장", "호수길 산책", "잔디광장 휴식"],
        tips: ["돗자리 준비 추천", "주말 주차 혼잡으로 대중교통 권장"],
        reviews: [
          { name: "익명", rating: 5, text: "아이와 함께 걷기 좋은 코스가 많아서 만족했어요." },
          { name: "익명", rating: 4, text: "벚꽃 구간이 길어서 여유롭게 구경하기 좋았습니다." },
          { name: "익명", rating: 5, text: "잔디광장에서 쉬면서 봄 분위기 즐기기 좋아요." }
        ]
      },
      "석촌호수공원": {
        subtitle: "호수 둘레 벚꽃길이 아름다운 포토 스팟",
        address: "서울 송파구 잠실로 148",
        time: "오후 5시~야간",
        point: "동호/서호 순환 산책길",
        lat: 37.5079,
        lng: 127.1007,
        description: "호수 반영과 벚꽃이 함께 보여 낮과 밤 모두 매력적인 풍경을 제공합니다.",
        highlight: "야간 조명 시간대에 감성적인 사진 촬영이 가능합니다.",
        route: ["동호 시작", "서호 방향 순환", "호수 야경 감상"],
        tips: ["개화 절정 주말엔 매우 혼잡", "편한 운동화 착용 추천"],
        reviews: [
          { name: "익명", rating: 5, text: "호수 따라 걷다 보면 어디서 찍어도 포토존이에요." },
          { name: "익명", rating: 4, text: "저녁 조명 켜질 때 분위기가 특히 좋아요." },
          { name: "익명", rating: 5, text: "동호에서 서호로 도는 코스가 가장 만족스러웠습니다." }
        ]
      },
      "여의도": {
        subtitle: "윤중로 벚꽃길로 유명한 축제 명소",
        address: "서울 영등포구 여의서로 일대",
        time: "오전 8시~10시",
        point: "국회의사당 뒤편 윤중로",
        lat: 37.5283,
        lng: 126.9335,
        description: "서울 벚꽃 시즌을 대표하는 장소로 긴 벚꽃길 산책을 즐길 수 있습니다.",
        highlight: "한강공원 피크닉을 연계하면 하루 일정이 알차집니다.",
        route: ["여의나루역 출발", "윤중로 산책", "한강공원 이동"],
        tips: ["축제 기간 교통 통제 확인", "대중교통 이용 시 이동 편리"],
        reviews: [
          { name: "익명", rating: 5, text: "벚꽃길이 길어서 산책 코스로 최고였어요." },
          { name: "익명", rating: 4, text: "사람은 많지만 축제 느낌이 살아있어서 재미있었어요." },
          { name: "익명", rating: 5, text: "한강까지 이어서 걷기 좋아서 데이트 코스로 추천합니다." }
        ]
      },
      "남산타워": {
        subtitle: "벚꽃길과 서울 전경을 함께",
        address: "서울 용산구 남산공원길 105",
        time: "해질녘~저녁",
        point: "남산순환로, 케이블카 주변",
        lat: 37.5512,
        lng: 126.9882,
        description: "벚꽃 산책 후 전망대에서 서울 전경을 감상할 수 있는 입체적 코스입니다.",
        highlight: "일몰 시간대 방문 시 도심 야경과 함께 감상 가능",
        route: ["남산 입구 출발", "순환로 벚꽃길", "타워 전망대 방문"],
        tips: ["가벼운 외투 준비", "도보 코스는 경사가 있어 편한 신발 필요"],
        reviews: [
          { name: "익명", rating: 5, text: "벚꽃 보며 오르다 보니 정상 풍경이 더 감동적이었어요." },
          { name: "익명", rating: 4, text: "경사가 조금 있지만 중간중간 쉬며 걷기 좋았습니다." },
          { name: "익명", rating: 5, text: "일몰 시간 맞춰 가니 뷰가 정말 멋졌어요." }
        ]
      },
      "서울숲": {
        subtitle: "도심 속 여유로운 자연형 벚꽃 명소",
        address: "서울 성동구 뚝섬로 273",
        time: "오전 9시~11시",
        point: "가족마당, 호수 주변길",
        lat: 37.5444,
        lng: 127.0374,
        description: "도심 접근성이 좋고 넓은 잔디와 함께 벚꽃 피크닉을 즐기기 좋습니다.",
        highlight: "산책, 피크닉, 카페 투어를 함께 하기 좋습니다.",
        route: ["서울숲역 입장", "가족마당 산책", "호수길 이동"],
        tips: ["돗자리와 간단한 간식 준비", "주말엔 여유 있게 이동 시간 확보"],
        reviews: [
          { name: "익명", rating: 5, text: "잔디밭에서 쉬면서 벚꽃 보기 정말 좋았어요." },
          { name: "익명", rating: 4, text: "카페랑 연결해서 코스 짜기 편한 점이 좋았습니다." },
          { name: "익명", rating: 5, text: "산책로가 넓고 분위기가 차분해서 힐링됐어요." }
        ]
      }
    };

    const params = new URLSearchParams(window.location.search);
    const spot = params.get("spot") || "경복궁";
    const data = details[spot] || details["경복궁"];
    const distanceEl = document.getElementById("spot-distance");

    document.title = `${spot} 상세페이지`;
    document.getElementById("spot-title").textContent = `${spot} 상세페이지`;
    document.getElementById("spot-subtitle").textContent = data.subtitle;
    document.getElementById("spot-name").textContent = spot;
    document.getElementById("spot-address").textContent = data.address;
    document.getElementById("spot-time").textContent = data.time;
    document.getElementById("spot-point").textContent = data.point;
    document.getElementById("spot-description").textContent = data.description;
    document.getElementById("spot-highlight").textContent = data.highlight;

    const routeEl = document.getElementById("spot-route");
    data.route.forEach((item) => {
      const li = document.createElement("li");
      li.textContent = item;
      routeEl.appendChild(li);
    });

    const tipsEl = document.getElementById("spot-tips");
    data.tips.forEach((item) => {
      const li = document.createElement("li");
      li.textContent = item;
      tipsEl.appendChild(li);
    });

    const reviewsEl = document.getElementById("spot-reviews");
    (data.reviews || []).forEach((review) => {
      const li = document.createElement("li");
      li.className = "review-item";

      const meta = document.createElement("div");
      meta.className = "review-meta";
      meta.textContent = `${review.name} | ${"★".repeat(review.rating)}${"☆".repeat(5 - review.rating)}`;

      const text = document.createElement("p");
      text.className = "review-text";
      text.textContent = review.text;

      li.appendChild(meta);
      li.appendChild(text);
      reviewsEl.appendChild(li);
    });

    function haversineKm(originLat, originLng, destLat, destLng) {
      const toRad = (deg) => (deg * Math.PI) / 180;
      const earthRadiusKm = 6371;
      const dLat = toRad(destLat - originLat);
      const dLng = toRad(destLng - originLng);
      const a = Math.sin(dLat / 2) ** 2 +
        Math.cos(toRad(originLat)) * Math.cos(toRad(destLat)) * Math.sin(dLng / 2) ** 2;
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return earthRadiusKm * c;
    }

    async function setRoadDistance() {
      if (typeof data.lat !== "number" || typeof data.lng !== "number") {
        distanceEl.textContent = "거리 정보를 찾을 수 없습니다.";
        return;
      }

      const osrmUrl = `https://router.project-osrm.org/route/v1/driving/${currentLocation.lng},${currentLocation.lat};${data.lng},${data.lat}?overview=false`;

      try {
        const response = await fetch(osrmUrl);
        if (!response.ok) {
          throw new Error("OSRM request failed");
        }
        const result = await response.json();
        const meters = result.routes && result.routes[0] ? result.routes[0].distance : null;
        if (!meters) {
          throw new Error("No route distance");
        }
        distanceEl.textContent = `${(meters / 1000).toFixed(1)} km (도로 기준)`;
      } catch (error) {
        const fallbackKm = haversineKm(currentLocation.lat, currentLocation.lng, data.lat, data.lng);
        distanceEl.textContent = `${fallbackKm.toFixed(1)} km (직선거리 추정)`;
      }
    }

    setRoadDistance();
  </script>
</body>
</html>
